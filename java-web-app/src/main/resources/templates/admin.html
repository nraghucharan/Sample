<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Admin – MyApp</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="nav-brand" th:href="@{/}">MyApp</a>
    <div class="nav-links">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/admin}">Admin</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="btn-link">Logout</button>
        </form>
    </div>
</nav>
<div class="container">
    <h1 style="margin-bottom:1.5rem;">Admin — User Management</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Enabled</th>
                <th>Created</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.role}"></td>
                <td th:text="${user.enabled} ? 'Yes' : 'No'"></td>
                <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="6" style="text-align:center; color:#888;">No users found.</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
